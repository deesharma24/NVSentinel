{{- if .Values.gpuSpecMonitor.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "csp-health-monitor.fullname" . }}-gpu-spec-monitor
  labels:
    {{- include "csp-health-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: gpu-spec-monitor
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-spec-monitor
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-spec-monitor
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with ((.Values.global).imagePullSecrets | default .Values.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "csp-health-monitor.fullname" . }}
      hostNetwork: {{ .Values.gpuSpecMonitor.hostNetwork | default false }}
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: gpu-spec-monitor
          image: "{{ .Values.gpuSpecMonitor.image.repository }}:{{ .Values.image.tag | default ((.Values.global).image).tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.gpuSpecMonitor.image.pullPolicy }}
          args:
          - "--csp={{ .Values.cspName }}"
          - "--metrics-port=2114"
          - "--poll-interval={{ .Values.gpuSpecMonitor.pollIntervalSeconds }}"
          - "--uds-path=/run/nvsentinel/nvsentinel.sock"
          - "--processing-strategy={{ .Values.processingStrategy }}"
          env:
            - name: LOG_LEVEL
              value: {{ .Values.gpuSpecMonitor.logLevel | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            {{- with .Values.gpuSpecMonitor.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 2114
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.gpuSpecMonitor.resources | nindent 12 }}
          volumeMounts:
            - name: platform-connector-uds
              mountPath: /run/nvsentinel
      volumes:
        - name: platform-connector-uds
          hostPath:
            path: /var/run/nvsentinel
            type: DirectoryOrCreate
{{- end }}
