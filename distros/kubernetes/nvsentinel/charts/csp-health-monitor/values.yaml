# Maintenance monitoring Deployment — runs csp-health-monitor + maintenance-notifier on system nodes.
# Disable for CSPs that don't support maintenance monitoring (Azure, OCI).
maintenanceMonitoring:
  enabled: true

replicaCount: 1

image:
  repository: ghcr.io/nvidia/nvsentinel/csp-health-monitor
  pullPolicy: IfNotPresent
  tag: ""

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "200m"
    memory: "256Mi"

# Configuration for the Quarantine Trigger Engine sidecar
quarantineTriggerEngine:
  image:
    repository: ghcr.io/nvidia/nvsentinel/maintenance-notifier
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  # Log verbosity for the sidecar, defaults to main container's logLevel if not set
  logLevel: info

# Scheduling configuration
nodeSelector: {}
affinity: {}
tolerations: []

podAnnotations: {}

# Processing strategy for health events
# valid values: EXECUTE_REMEDIATION, STORE_ONLY
# default: EXECUTE_REMEDIATION
# EXECUTE_REMEDIATION: normal behavior; downstream modules may update cluster state.
# STORE_ONLY: observability-only behavior; event should be persisted/exported but should not modify cluster resources (i.e., no node conditions, no quarantine, no drain, no remediation).
processingStrategy: EXECUTE_REMEDIATION

# Log verbosity level for the main CSP health monitor container (e.g. "debug", "info", "warn", "error")
logLevel: info

# Client certificate mount path for database connections
clientCertMountPath: /etc/ssl/client-certs

# cspName specifies the active cloud service provider.
# Used by both maintenanceMonitoring (Deployment) and gpuSpecMonitor (DaemonSet).
# Valid values: gcp | aws | azure | oci
cspName: ""

# config.toml content will be generated from the fields below using the configmap template.
# Both main container and sidecar will mount and use this.
configToml:
  # Global settings
  maintenanceEventPollIntervalSeconds: 60 # Used by Quarantine Trigger Engine sidecar
  triggerQuarantineWorkflowTimeLimitMinutes: 30 # Used by Quarantine Trigger Engine sidecar
  postMaintenanceHealthyDelayMinutes: 15 # Used by Quarantine Trigger Engine sidecar
  nodeReadinessTimeoutMinutes: 60 # Used to monitor node readiness after maintenance
  clusterName: "" # Used by main monitor and potentially sidecar if needed
  kubeconfigPath: ""  # Optional, only set if running out-of-cluster against a tenant. Set to non-empty string to enable.

  gcp:
    targetProjectId: "" # Used by main monitor
    apiPollingIntervalSeconds: 60 # Used by main monitor (GCP poller)
    gcpServiceAccountName: "" # GCP service account name for workload identity
    logFilter: "" # example: 'logName="projects/{PROJECT_ID}/logs/csp-health-monitor-test-log" AND operation.producer="compute.instances.upcomingMaintenance"'

  aws:
    accountId: "" # Used by main monitor
    # How often to poll the AWS Health API for events in seconds
    pollingIntervalSeconds: 60 # Used by main monitor (AWS poller)
    # AWS region of the tenant cluster.
    region: "" # Used by main monitor
    # Custom IAM role name for IRSA (IAM Roles for Service Accounts).
    # If empty, defaults to "<clusterName>-nvsentinel-health-monitor-assume-role-policy".
    # Set this if your cluster name exceeds 19 characters (AWS IAM role names max 64 chars).
    iamRoleName: ""

# GPU Spec Monitor DaemonSet — runs on GPU worker nodes.
# Fetches expected GPU spec from the CSP API once at startup, then
# periodically checks the actual GPU count via NVML and publishes
# health events on mismatch.  Exposes Prometheus metrics.
# Uses top-level cspName to determine the active CSP.
gpuSpecMonitor:
  enabled: false
  image:
    repository: ghcr.io/nvidia/nvsentinel/gpu-spec-monitor
    pullPolicy: IfNotPresent
  # hostNetwork is required for GCP (IMDS unreachable without it on GKE).
  # Not needed for AWS, Azure, or OCI.
  hostNetwork: false
  # Interval (in seconds) between NVML GPU count checks.
  # The CSP API is called only once at startup; this controls NVML polling only.
  pollIntervalSeconds: 900
  logLevel: info
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Extra environment variables for CSP-specific configuration.
  # Example for OCI (set per cluster when enabling gpu-spec-monitor on OKE):
  #   extraEnv:
  #     - name: OCI_RESOURCE_PRINCIPAL_VERSION
  #       value: "2.2"
  #     - name: OCI_RESOURCE_PRINCIPAL_REGION
  #       value: "uk-london-1"
  extraEnv: []
